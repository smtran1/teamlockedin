<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logon</title>
  <link rel="stylesheet" href="css/logon.css">
</head>

<body>
  <div class="container">
    <h1>Welcome to Node App</h1>

    <div class="tab">
      <button type="button" class="tab-button active" id="login-tab">Sign in</button>
      <button type="button" class="tab-button" id="create-account-tab">Create Account</button>
    </div>

    <div id="form-container">
      <form id="logon-form" class="active-form" novalidate>
        <label for="login-email">Email:</label>
        <input type="email" id="login-email" placeholder="Enter your email" autocomplete="email" required>

        <label for="login-password">Password:</label>
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>

        <button type="submit" class="button">Sign in</button>

        <div class="inline-links">
          <a href="#" id="create-account-link">Create an account</a>
        </div>
      </form>

      <form id="create-account-form" novalidate>
        <label for="create-email">Email:</label>
        <input type="email" id="create-email" placeholder="Enter your email" autocomplete="email" required>

        <label for="create-password">Password:</label>
        <input type="password" id="create-password" placeholder="Create your password" autocomplete="new-password" required>

        <label for="create-password-confirm">Confirm Password (optional):</label>
        <input type="password" id="create-password-confirm" placeholder="Confirm your password" autocomplete="new-password">

        <div class="checkbox-row">
          <input type="checkbox" id="terms-checkbox" required>
          <label for="terms-checkbox">I agree to the Terms and Privacy Policy</label>
        </div>

        <p id="password-help" class="helper">
          Password must be at least 8 characters and include an uppercase letter, a lowercase letter, and a number.
        </p>

        <button type="submit" class="button">Create Account</button>
      </form>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </div>
  </div>

  <script src="js/logon.js"></script>
</body>

</html>
